# Smart Agent Hub Configuration

settings:
  llm:
    provider: "qwen"
    model: "qwen3.5-plus"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "sk-d3a8a609e30940d9a87fdf7b0b10d6b2"
    temperature: 0.0
    max_tokens: 4096

  agent:
    max_iterations: 10
    enable_reflection: true
    enable_memory: true

  storage:
    db_path: "data/db/agent_sessions.db"
    log_path: "data/logs/agent_traces.jsonl"

  dashboard:
    enabled: true
    port: 8502

  mcp_servers:
    rag_server:
      enabled: true
      command: "E:/Anaconda/python.exe"
      args:
        - "E:/code/MODULAR-RAG-MCP-SERVER/main.py"
      cwd: "E:/code/MODULAR-RAG-MCP-SERVER"
      timeout: 120
      tools:
        - query_knowledge_hub
        - list_collections
        - get_document_summary
