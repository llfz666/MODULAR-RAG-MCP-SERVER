# Smart Agent Hub Configuration

settings:
  llm:
    provider: "qwen"
    model: "qwen3.5-plus"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${QWEN_API_KEY}"
    temperature: 0.0
    max_tokens: 4096

  agent:
    max_iterations: 10
    enable_reflection: true
    enable_memory: true

  storage:
    db_path: "data/db/agent_sessions.db"
    log_path: "data/logs/agent_traces.jsonl"

  dashboard:
    enabled: true
    port: 8502

  mcp_servers:
    rag_server:
      enabled: true
      command: "python"
      args:
        - "main.py"
      cwd: "../MODULAR-RAG-MCP-SERVER"
      timeout: 60
      tools:
        - search
        - list_collections
        - preview_document
        - compare_documents