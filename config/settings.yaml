# Modular RAG MCP Server - Configuration
# This is the main configuration file for the MCP Server.
# Edit this file to configure LLM, Embedding, VectorStore, and other services.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "qwen"  # Options: openai, azure, ollama, deepseek, qwen
  model: "qwen3.5-plus"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "sk-d3a8a609e30940d9a87fdf7b0b10d6b2"
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "qwen"  # Options: openai, azure, ollama, qwen
  model: "text-embedding-v3"
  dimensions: 1024
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "sk-d3a8a609e30940d9a87fdf7b0b10d6b2"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true  # Set to true to enable vision capabilities
  provider: "qwen"  # Options: openai, azure, ollama, qwen
  model: "qwen-vl-max"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "sk-d3a8a609e30940d9a87fdf7b0b10d6b2"
  max_image_size: 2048  # Max dimension (width/height) for image compression

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"  # Options: chroma, qdrant, pinecone
  persist_directory: "e:/code/MODULAR-RAG-MCP-SERVER/data/db/chroma"
  collection_name: "knowledge_hub"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: true
  provider: "cross_encoder"  # Options: none, cross_encoder, llm
  # Cross-Encoder Model: Lightweight local model for semantic reranking
  # Recommended: cross-encoder/ms-marco-MiniLM-L-6-v2
  # Alternative: cross-encoder/ms-marco-TinyBERT-L-2-v2 (faster, less accurate)
  # Use local model path to avoid HuggingFace connection issues
  model: "C:/Users/hghggh/.cache/huggingface/hub/models--cross-encoder--ms-marco-MiniLM-L-6-v2/snapshots/c5ee24cb16019beea0893ab7796b1df96625c6b8"
  # LLM Model: Use when provider is 'llm' (uses llm.provider setting)
  # model: "qwen3.5-plus"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: true
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    # Note: "faithfulness" requires ragas backend. Use "composite" provider to run both.

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "e:/code/MODULAR-RAG-MCP-SERVER/logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"  # Options: recursive, semantic, fixed_length
  batch_size: 100
  
  # Chunk Refiner Configuration (C5)
  chunk_refiner:
    use_llm: true  # Set to true to enable LLM-based refinement (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based refinement
  
  # Metadata Enricher Configuration (C6)
  metadata_enricher:
    use_llm: true  # Set to true to enable LLM-based enrichment (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based enrichment